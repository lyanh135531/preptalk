version: "3.9"

services:
  # ── PrepTalk (API + Static Frontend) ──
  # Single container: Express backend serves built React frontend
  # Accessible on port HOST_PORT (default 8080)
  preptalk:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${HOST_PORT:-8080}:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENROUTER_API_KEY=***      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL:-openai/gpt-oss-20b:free}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-*}
      - VITE_TTS_EN_VOICE_NAME=${VITE_TTS_EN_VOICE_NAME:-en-US-AndrewNeural}
      - VITE_TTS_VI_VOICE_NAME=${VITE_TTS_VI_VOICE_NAME:-vi-VN-NamMinhNeural}
    volumes:
      - tts-cache:/tmp/tts-cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

volumes:
  tts-cache:
