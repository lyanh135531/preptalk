services:
  # ── PrepTalk (API + Static Frontend) ──
  # Single container: Express backend serves built React frontend
  # Accessible on port HOST_PORT (default 8080)
  preptalk:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${HOST_PORT:-3217}:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - tts-cache:/tmp/tts-cache
      - /home/systems/preptalk/uploads:/home/systems/preptalk/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

volumes:
  tts-cache: